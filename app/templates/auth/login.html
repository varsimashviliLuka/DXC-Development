{% extends "base.html" %}

{% block title %}Sign in — Elevator Chip{% endblock %}

{% block content %}
<div class="auth-page">
  <section class="panel auth-card">
    <header class="page-header">
      <div>
        <h1>Welcome back</h1>
        <p class="page-subtitle">Sign in with your 11-digit ID number and password.</p>
      </div>
    </header>

    <form method="post" class="form">
      <div class="form-group">
        <label for="id_number">ID number</label>
        <input type="text" id="id_number" name="id_number" required
               inputmode="numeric" pattern="\d{11}" maxlength="11" minlength="11"
               placeholder="01124096118"
               value="{{ request.form.get('id_number', '') }}">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary btn-block">Sign in</button>
    </form>
  </section>
</div>
{% endblock %}
