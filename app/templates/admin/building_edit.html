{% extends "base.html" %}
{% from "macros/ui.html" import page_header %}

{% block title %}Edit Building — Admin{% endblock %}

{% block content %}
{{ page_header("Edit building", "Update building registry details.") }}

<section class="panel">
  <form method="post" class="form form-grid">
    <div class="form-group">
      <label for="building_number">Building number</label>
      <input type="text" id="building_number" name="building_number" required
             value="{{ form.get('building_number', building.building_number) }}">
    </div>
    <div class="form-group">
      <label for="name">Name</label>
      <input type="text" id="name" name="name" required
             value="{{ form.get('name', building.name) }}">
    </div>
    <div class="form-group form-group-full">
      <label for="address">Address</label>
      <input type="text" id="address" name="address"
             value="{{ form.get('address', building.address or '') }}">
    </div>
    <div class="form-group form-group-full">
      <label for="admin_comment">Admin comment</label>
      <textarea id="admin_comment" name="admin_comment" rows="4"
                placeholder="Internal notes visible only to admins">{{ form.get('admin_comment', building.admin_comment or '') }}</textarea>
    </div>
    <div class="form-actions">
      <a href="{{ url_for('admin.buildings') }}" class="btn btn-ghost">Cancel</a>
      <button type="submit" class="btn btn-primary">Save changes</button>
    </div>
  </form>
  <form method="post" action="{{ url_for('admin.delete_building', building_id=building.id) }}" class="form form-actions"
        onsubmit="return confirm('Delete this building and all of its subscriptions?');">
    <button type="submit" class="btn btn-danger">Delete building</button>
  </form>
</section>
{% endblock %}
