{% macro render_pagination(pagination, endpoint, q=None) %}
  {% if pagination.pages > 1 %}
  <nav class="pagination" aria-label="Pagination">
    {% if pagination.has_prev %}
      <a class="btn btn-ghost btn-sm" href="{{ url_for(endpoint, page=pagination.prev_num, q=q) if q else url_for(endpoint, page=pagination.prev_num) }}">Previous</a>
    {% endif %}
    <span class="pagination-info">Page {{ pagination.page }} of {{ pagination.pages }} · {{ pagination.total }} total</span>
    {% if pagination.has_next %}
      <a class="btn btn-ghost btn-sm" href="{{ url_for(endpoint, page=pagination.next_num, q=q) if q else url_for(endpoint, page=pagination.next_num) }}">Next</a>
    {% endif %}
  </nav>
  {% endif %}
{% endmacro %}
